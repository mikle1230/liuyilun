<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>写文章 · 科技</title>
<style>
/* ════════════════════════════════════════
   Variant 2 — 科技 (Tech)
   Dark theme, gold accent, glass panels,
   matches existing site design system
   ════════════════════════════════════════ */
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'DM Sans', 'PingFang SC', -apple-system, sans-serif;
  background: #09090b;
  color: #f4f4f5;
  min-height: 100vh;
}

/* ── Top Bar ── */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: 56px;
  background: rgba(9,9,11,0.9);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid #1c1c22;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 40px;
}
.topbar-left { display: flex; align-items: center; gap: 20px; }
.topbar-title { font-size: 13px; font-weight: 600; color: #a1a1aa; letter-spacing: 0.05em; text-transform: uppercase; }
.topbar-back {
  font-size: 13px; color: #52525b; text-decoration: none;
  display: inline-flex; align-items: center; gap: 4px; transition: 0.2s;
}
.topbar-back:hover { color: #c9a96e; }
.topbar-right { display: flex; gap: 10px; }
.topbar-btn {
  padding: 6px 18px; border-radius: 6px; border: 1px solid #1c1c22;
  background: #121214; color: #a1a1aa; font-size: 12px; font-weight: 500;
  cursor: pointer; transition: 0.2s;
}
.topbar-btn:hover { border-color: #27272a; color: #f4f4f5; }
.topbar-btn.gold {
  background: #c9a96e; color: #09090b; border-color: #c9a96e;
}
.topbar-btn.gold:hover { background: #d4b87a; }

/* ── Layout ── */
.app { display: flex; height: 100vh; padding-top: 56px; }

/* ── Sidebar ── */
.sidebar {
  width: 280px;
  background: #0d0d0f;
  border-right: 1px solid #1c1c22;
  display: flex;
  flex-direction: column;
}
.sidebar-header {
  padding: 20px 20px 12px;
  font-size: 11px; font-weight: 600; color: #52525b;
  letter-spacing: 0.08em; text-transform: uppercase;
  border-bottom: 1px solid #1c1c22;
}
.sidebar-tabs { display: flex; padding: 4px 12px 0; border-bottom: 1px solid #1c1c22; gap: 2px; }
.sidebar-tab {
  flex: 1; padding: 10px 0 8px; border: none; background: none;
  font-size: 12px; color: #52525b; cursor: pointer;
  border-bottom: 2px solid transparent; transition: 0.2s;
  text-align: center;
}
.sidebar-tab.active { color: #c9a96e; border-bottom-color: #c9a96e; }
.sidebar-tab:hover:not(.active) { color: #a1a1aa; }
.sidebar-list { flex: 1; overflow-y: auto; padding: 8px; }
.sidebar-item {
  display: block; width: 100%; padding: 10px 12px; border: none;
  background: transparent; border-radius: 6px; text-align: left;
  cursor: pointer; transition: 0.15s; font-size: 13px; color: #a1a1aa;
}
.sidebar-item:hover { background: rgba(201,169,110,0.06); color: #f4f4f5; }
.sidebar-item.active { background: rgba(201,169,110,0.1); color: #f4f4f5; border-left: 2px solid #c9a96e; border-radius: 0 6px 6px 0; }
.sidebar-item-date { font-size: 11px; color: #52525b; display: block; margin-top: 2px; }

/* ── Main Editor ── */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #09090b; }

.editor-header {
  padding: 24px 40px 0;
  display: flex; flex-direction: column; gap: 12px;
  background: #0d0d0f;
  border-bottom: 1px solid #1c1c22;
}
.editor-type-row { display: flex; align-items: center; gap: 8px; }
.type-tab {
  padding: 6px 16px; border-radius: 6px; border: 1px solid #1c1c22;
  background: transparent; color: #52525b; font-size: 12px; cursor: pointer; transition: 0.2s;
}
.type-tab.active { border-color: #c9a96e; color: #c9a96e; background: rgba(201,169,110,0.08); }
.type-tab:hover:not(.active) { border-color: #27272a; color: #a1a1aa; }
.title-input {
  width: 100%; padding: 8px 0; border: none; background: transparent;
  font-size: 26px; font-weight: 700; color: #f4f4f5; outline: none;
  font-family: 'Noto Serif SC', Georgia, serif;
}
.title-input::placeholder { color: #27272a; }
.tags-input {
  width: 100%; padding: 8px 12px; border: 1px solid #1c1c22;
  border-radius: 6px; background: #121214; color: #f4f4f5;
  font-size: 13px; outline: none; margin-bottom: 16px;
  transition: 0.2s;
}
.tags-input:focus { border-color: #c9a96e; }
.tags-input::placeholder { color: #52525b; }

/* ── Split ── */
.split {
  flex: 1; display: grid; grid-template-columns: 1fr 1fr;
  gap: 0; overflow: hidden;
}
.textarea-wrapper { position: relative; }
.textarea {
  width: 100%; height: 100%; padding: 28px;
  border: none; border-right: 1px solid #1c1c22;
  background: #09090b;
  font-family: 'SF Mono', 'JetBrains Mono', monospace;
  font-size: 13px; line-height: 1.9; color: #f4f4f5;
  resize: none; outline: none;
}
.textarea::placeholder { color: #27272a; }
.textarea-line {
  position: absolute; left: 0; top: 28px; bottom: 28px; width: 40px;
  border-right: 1px solid #1c1c22;
  opacity: 0.3;
}
.preview {
  padding: 28px; overflow-y: auto; background: #0d0d0f;
}
.preview h1 { font-family: 'Noto Serif SC', Georgia, serif; font-size: 26px; margin-bottom: 20px; color: #f4f4f5; }
.preview p { font-size: 14px; line-height: 1.9; color: #a1a1aa; margin: 14px 0; }
.preview strong { color: #f4f4f5; }
.preview blockquote { margin: 20px 0; padding: 14px 20px; border-left: 3px solid #c9a96e; background: rgba(201,169,110,0.06); border-radius: 0 6px 6px 0; }
.preview blockquote p { margin: 4px 0; color: #f4f4f5; }
.preview ul { margin: 14px 0; padding-left: 20px; }
.preview li { font-size: 14px; line-height: 1.9; color: #a1a1aa; }
.preview li::marker { color: #c9a96e; }
.preview code { font-family: 'SF Mono', monospace; font-size: 0.88em; background: #121214; padding: 2px 6px; border-radius: 4px; color: #c9a96e; border: 1px solid #1c1c22; }

/* ── Footer ── */
.footer {
  padding: 12px 40px;
  border-top: 1px solid #1c1c22;
  background: #0d0d0f;
  display: flex; align-items: center; justify-content: space-between;
}
.md-bar { display: flex; align-items: center; gap: 4px; overflow-x: auto; }
.md-label { font-size: 10px; color: #52525b; font-weight: 600; margin-right: 4px; letter-spacing: 0.08em; }
.md-chip {
  padding: 2px 8px; border-radius: 4px; border: 1px solid #1c1c22;
  font-family: 'SF Mono', monospace; font-size: 11px; color: #52525b;
  cursor: pointer; white-space: nowrap; transition: 0.15s;
  line-height: 1.6;
}
.md-chip:hover { border-color: #c9a96e; color: #c9a96e; background: rgba(201,169,110,0.06); }
.publish-btn {
  flex-shrink: 0; padding: 8px 28px; border-radius: 6px; border: none;
  background: #c9a96e; color: #09090b; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: 0.2s;
}
.publish-btn:hover { background: #d4b87a; }
.publish-btn:disabled { opacity: 0.35; cursor: not-allowed; }

/* ── Success ── */
.success-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(9,9,11,0.92);
  display: flex; align-items: center; justify-content: center;
}
.success-card {
  text-align: center; max-width: 380px;
}
.success-card h2 { font-size: 28px; font-weight: 700; margin-bottom: 8px; color: #f4f4f5; }
.success-card p { color: #52525b; font-size: 14px; margin-bottom: 32px; line-height: 1.7; }
.success-actions { display: flex; flex-direction: column; align-items: center; gap: 10px; }
.success-actions .topbar-btn { width: 220px; padding: 10px; justify-content: center; display: flex; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <a class="topbar-back" href="#">← 返回首页</a>
    <span class="topbar-title">发布文章</span>
  </div>
  <div class="topbar-right">
    <button class="topbar-btn">📋 管理文章</button>
  </div>
</div>

<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">全部文章</div>
    <div class="sidebar-tabs">
      <button class="sidebar-tab active">博客</button>
      <button class="sidebar-tab">AI 收集</button>
    </div>
    <div class="sidebar-list">
      <button class="sidebar-item active">
        <span>欢迎来到我的博客</span>
        <span class="sidebar-item-date">2026-06-27 · 随笔</span>
      </button>
      <button class="sidebar-item">
        <span>MICE 行业观察</span>
        <span class="sidebar-item-date">2026-06-27 · 行业</span>
      </button>
    </div>
  </div>

  <div class="main">
    <div class="editor-header">
      <div class="editor-type-row">
        <button class="type-tab active">📝 博客</button>
        <button class="type-tab">🤖 AI 收集</button>
      </div>
      <input class="title-input" placeholder="文章标题" value="欢迎来到我的博客" />
      <input class="tags-input" placeholder="标签（逗号分隔）" value="随笔, 个人" />
    </div>

    <div class="split">
      <div class="textarea-wrapper">
        <textarea class="textarea" placeholder="在此粘贴或撰写 Markdown 内容…">## 关于这个博客

你好，这里是我记录日常感悟、分享所见所闻的地方。

在 19 年的行业经历中，我发现**记录与分享**是成长最快的方式。

> "写作不是为了记录，而是为了思考。"</textarea>
      </div>
      <div class="preview">
        <h1>欢迎来到我的博客</h1>
        <p>你好，这里是我记录日常感悟、分享所见所闻的地方。</p>
        <p>在 19 年的行业经历中，我发现<strong>记录与分享</strong>是成长最快的方式。</p>
        <blockquote><p>"写作不是为了记录，而是为了思考。"</p></blockquote>
      </div>
    </div>

    <div class="footer">
      <div class="md-bar">
        <span class="md-label">Markdown</span>
        <span class="md-chip"># H1</span>
        <span class="md-chip">## H2</span>
        <span class="md-chip">**粗**</span>
        <span class="md-chip">*斜*</span>
        <span class="md-chip">[文](url)</span>
        <span class="md-chip">- 项</span>
        <span class="md-chip">&gt; 引</span>
        <span class="md-chip">`代码`</span>
        <span class="md-chip">---</span>
      </div>
      <button class="publish-btn">📤 发送</button>
    </div>
  </div>
</div>

<div class="success-overlay" style="display:none">
  <div class="success-card">
    <h2>✅ 发送成功</h2>
    <p>文章已推送到 GitHub<br>Vercel 正在部署，约 30 秒后上线</p>
    <div class="success-actions">
      <button class="topbar-btn gold" style="padding:10px;width:220px">🌍 查看博客</button>
      <button class="topbar-btn" style="padding:10px;width:220px">✏️ 写新博客</button>
      <button class="topbar-btn" style="padding:10px;width:220px">🏠 返回首页</button>
    </div>
  </div>
</div>

<p style="position:fixed;bottom:12px;right:20px;font-size:11px;color:#27272a;background:rgba(13,13,15,0.9);padding:4px 12px;border-radius:4px;">科技 · 深色主题 · 金色强调 · 延续现有设计</p>
</body>
</html>
