<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>写文章 · 极简</title>
<style>
/* ════════════════════════════════════════
   Variant 1 — 极简 (Minimal)
   Low contrast, generous whitespace,
   subtle borders, content-first
   ════════════════════════════════════════ */
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, 'Inter', 'PingFang SC', sans-serif;
  background: #f5f5f7;
  color: #1d1d1f;
  min-height: 100vh;
}

/* ── Top Bar ── */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: 52px;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(0,0,0,0.06);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 32px;
}
.topbar-left { display: flex; align-items: center; gap: 24px; }
.topbar-title { font-size: 13px; font-weight: 600; color: #1d1d1f; letter-spacing: -0.01em; }
.topbar-back {
  font-size: 13px; color: #86868b; text-decoration: none;
  display: inline-flex; align-items: center; gap: 4px;
}
.topbar-back:hover { color: #1d1d1f; }
.topbar-right { display: flex; gap: 12px; }
.topbar-btn {
  padding: 6px 16px; border-radius: 6px; border: 1px solid #d2d2d7;
  background: #fff; color: #1d1d1f; font-size: 12px; font-weight: 500;
  cursor: pointer; transition: 0.15s;
}
.topbar-btn:hover { border-color: #86868b; }
.topbar-btn.primary { background: #1d1d1f; color: #fff; border-color: #1d1d1f; }
.topbar-btn.primary:hover { background: #000; }

/* ── Layout ── */
.app { display: flex; height: 100vh; padding-top: 52px; }

/* ── Sidebar — Manage panel ── */
.sidebar {
  width: 300px;
  background: #fff;
  border-right: 1px solid #e8e8ed;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.sidebar-header {
  padding: 20px 20px 12px;
  font-size: 11px; font-weight: 600; color: #86868b;
  letter-spacing: 0.05em; text-transform: uppercase;
  border-bottom: 1px solid #e8e8ed;
}
.sidebar-tabs {
  display: flex; gap: 0; padding: 4px 16px 0;
  border-bottom: 1px solid #e8e8ed;
}
.sidebar-tab {
  flex: 1; padding: 10px 0 8px; border: none; background: none;
  font-size: 13px; color: #86868b; cursor: pointer;
  border-bottom: 2px solid transparent;
  text-align: center; transition: 0.15s;
}
.sidebar-tab.active { color: #1d1d1f; border-bottom-color: #1d1d1f; }
.sidebar-list { flex: 1; overflow-y: auto; padding: 8px; }
.sidebar-item {
  display: block; width: 100%; padding: 10px 12px; border: none;
  background: transparent; border-radius: 6px; text-align: left;
  cursor: pointer; transition: 0.12s;
  font-size: 13px; color: #1d1d1f;
}
.sidebar-item:hover { background: #f5f5f7; }
.sidebar-item.active { background: #f0f0f2; font-weight: 500; }
.sidebar-item-date { font-size: 11px; color: #86868b; display: block; margin-top: 2px; }

/* ── Main Editor ── */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.editor-header {
  padding: 24px 32px 0;
  display: flex; flex-direction: column; gap: 12px;
}
.editor-type-row { display: flex; align-items: center; gap: 12px; }
.type-tab {
  padding: 6px 16px; border-radius: 6px; border: 1px solid #d2d2d7;
  background: #fff; color: #86868b; font-size: 12px; cursor: pointer; transition: 0.15s;
}
.type-tab.active { border-color: #1d1d1f; color: #1d1d1f; background: #f5f5f7; }
.title-input {
  width: 100%; padding: 8px 0; border: none; background: transparent;
  font-size: 28px; font-weight: 700; color: #1d1d1f; outline: none;
  font-family: 'Georgia', 'Noto Serif SC', serif;
}
.title-input::placeholder { color: #c7c7cc; }
.tags-input {
  width: 100%; padding: 8px 12px; border: 1px solid #d2d2d7;
  border-radius: 6px; background: #fff; color: #1d1d1f;
  font-size: 13px; outline: none;
}
.tags-input:focus { border-color: #86868b; }

/* ── Split Pane ── */
.split {
  flex: 1; display: grid; grid-template-columns: 1fr 1fr;
  gap: 0; margin: 16px 32px 0; overflow: hidden;
}
.textarea {
  padding: 20px; border: 1px solid #e8e8ed; border-right: none;
  border-radius: 8px 0 0 8px; background: #fbfbfd;
  font-family: 'SF Mono', 'JetBrains Mono', monospace;
  font-size: 13px; line-height: 1.8; color: #1d1d1f;
  resize: none; outline: none;
}
.textarea::placeholder { color: #c7c7cc; }
.preview {
  padding: 20px; border: 1px solid #e8e8ed;
  border-radius: 0 8px 8px 0; background: #fff;
  overflow-y: auto;
}

/* ── Footer ── */
.footer {
  padding: 12px 32px;
  border-top: 1px solid #e8e8ed;
  background: rgba(255,255,255,0.8);
  display: flex; align-items: center; justify-content: space-between;
}
.md-bar { display: flex; align-items: center; gap: 6px; overflow-x: auto; }
.md-label { font-size: 11px; color: #c7c7cc; font-weight: 500; margin-right: 4px; letter-spacing: 0.05em; }
.md-chip {
  padding: 2px 8px; border-radius: 4px; border: 1px solid #e8e8ed;
  font-family: 'SF Mono', monospace; font-size: 11px; color: #86868b;
  cursor: pointer; white-space: nowrap;
  transition: 0.12s;
}
.md-chip:hover { border-color: #1d1d1f; color: #1d1d1f; }
.publish-btn {
  flex-shrink: 0; padding: 8px 28px; border-radius: 6px; border: none;
  background: #1d1d1f; color: #fff; font-size: 13px; font-weight: 500;
  cursor: pointer; transition: 0.15s;
}
.publish-btn:hover { background: #000; }
.publish-btn:disabled { opacity: 0.35; cursor: not-allowed; }

/* ── Preview text ── */
.preview h1 { font-family: 'Georgia', serif; font-size: 24px; margin-bottom: 16px; color: #1d1d1f; }
.preview p { font-size: 14px; line-height: 1.8; color: #515154; margin: 12px 0; }
.preview blockquote { margin: 16px 0; padding: 12px 16px; border-left: 3px solid #1d1d1f; background: #f5f5f7; border-radius: 0 6px 6px 0; }
.preview blockquote p { margin: 4px 0; color: #1d1d1f; }
.preview ul { margin: 12px 0; padding-left: 20px; }
.preview li { font-size: 14px; line-height: 1.8; color: #515154; }
.preview code { font-family: 'SF Mono', monospace; font-size: 0.88em; background: #f5f5f7; padding: 2px 6px; border-radius: 3px; }

/* ── Success overlay ── */
.success-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(245,245,247,0.95);
  display: flex; align-items: center; justify-content: center;
}
.success-card {
  text-align: center;
}
.success-card h2 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
.success-card p { color: #86868b; font-size: 15px; margin-bottom: 28px; }
.success-actions { display: flex; flex-direction: column; align-items: center; gap: 10px; }
.success-actions .topbar-btn { width: 200px; padding: 10px; text-align: center; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <a class="topbar-back" href="#">← 返回首页</a>
    <span class="topbar-title">写文章</span>
  </div>
  <div class="topbar-right">
    <button class="topbar-btn">📋 管理文章</button>
  </div>
</div>

<div class="app">
  <!-- Sidebar (manage mode collapsed by default, shown here for demo) -->
  <div class="sidebar">
    <div class="sidebar-header">全部文章</div>
    <div class="sidebar-tabs">
      <button class="sidebar-tab active">博客</button>
      <button class="sidebar-tab">AI 收集</button>
    </div>
    <div class="sidebar-list">
      <button class="sidebar-item active">
        <span>欢迎来到我的博客</span>
        <span class="sidebar-item-date">2026-06-27</span>
      </button>
      <button class="sidebar-item">
        <span>MICE 行业观察</span>
        <span class="sidebar-item-date">2026-06-27</span>
      </button>
    </div>
  </div>

  <!-- Main editor -->
  <div class="main">
    <div class="editor-header">
      <div class="editor-type-row">
        <button class="type-tab active">📝 博客</button>
        <button class="type-tab">🤖 AI 收集</button>
      </div>
      <input class="title-input" placeholder="文章标题" />
      <input class="tags-input" placeholder="标签（逗号分隔）" />
    </div>

    <div class="split">
      <textarea class="textarea" placeholder="在此粘贴或撰写 Markdown 内容…">## 关于这个博客

你好，我是刘逸伦。这里是我记录日常感悟、分享所见所闻的地方。

在 19 年的行业经历中，我发现**记录与分享**是成长最快的方式。

> "写作不是为了记录，而是为了思考。"</textarea>
      <div class="preview">
        <h1>欢迎来到我的博客</h1>
        <p>你好，我是刘逸伦。这里是我记录日常感悟、分享所见所闻的地方。</p>
        <p>在 19 年的行业经历中，我发现<strong>记录与分享</strong>是成长最快的方式。</p>
        <blockquote><p>"写作不是为了记录，而是为了思考。"</p></blockquote>
      </div>
    </div>

    <div class="footer">
      <div class="md-bar">
        <span class="md-label">语法</span>
        <span class="md-chip"># H1</span>
        <span class="md-chip">**粗**</span>
        <span class="md-chip">*斜*</span>
        <span class="md-chip">[文](url)</span>
        <span class="md-chip">- 项</span>
        <span class="md-chip">1. 项</span>
        <span class="md-chip">&gt; 引</span>
        <span class="md-chip">`代码`</span>
        <span class="md-chip">---</span>
      </div>
      <button class="publish-btn">📤 发送</button>
    </div>
  </div>
</div>

<div class="success-overlay" style="display:none">
  <div class="success-card">
    <h2>✅ 发送成功</h2>
    <p>文章已推送到 GitHub，Vercel 正在部署<br>大约 30 秒后上线</p>
    <div class="success-actions">
      <button class="topbar-btn primary" style="width:200px;padding:10px">🌍 查看博客</button>
      <button class="topbar-btn" style="width:200px;padding:10px;justify-content:center">✏️ 写新博客</button>
      <button class="topbar-btn" style="width:200px;padding:10px;justify-content:center">🏠 返回首页</button>
    </div>
  </div>
</div>

<p style="position:fixed;bottom:12px;right:20px;font-size:11px;color:#c7c7cc;background:rgba(255,255,255,0.8);padding:4px 12px;border-radius:4px;">极简 · 低对比度 · 大量留白</p>
</body>
</html>
